version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: evaluator-backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - backend_data:/app/data
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    container_name: evaluator-worker
    command: celery -A app.workers.tasks worker --loglevel=info
    env_file:
      - ./.env
    volumes:
      - ./backend/app:/app/app
      - backend_data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7.2-alpine
    container_name: evaluator-redis
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
    container_name: evaluator-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  backend_data:
